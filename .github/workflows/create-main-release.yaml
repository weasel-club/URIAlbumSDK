name: Create Main Release
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set tag as version in package.json
        run: |
          VERSION=$(echo "${{ github.ref_name }}")
          echo "Updating package.json version to $VERSION"
          jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp
          cp package.json.tmp package.json

      - name: Make zip
        run: |
          VERSION=$(echo "${{ github.ref_name }}")
          mkdir output
          zip -r "output/URIAlbumSDK-${VERSION}.zip" . -x .git/\* -x .github/\* -x output/\*

      - name: Make unitypackage
        uses: weasel-club/unitypackage-release-action@v1
        with:
          output_dir: output
          packages_json: |
            [
              {
                "package_name": "URIAlbumSDK",
                "output_file_name": "URIAlbumSDK-${{ github.ref_name }}.unitypackage",
                "include_roots": ["Editor", "Runtime", "package.json"],
                "target_root": "Assets/URIAlbumSDK"
              }
            ]

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./output/URIAlbumSDK-${{ github.ref_name }}.zip
            ./output/URIAlbumSDK-${{ github.ref_name }}.unitypackage
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          name: URIAlbumSDK-${{ github.ref_name }}

      - name: Trigger packages workflow
        uses: convictional/trigger-workflow-and-wait@v1.6.1
        with:
          owner: weasel-club
          repo: packages
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          workflow_file_name: build-listing.yml
          ref: main
          trigger_workflow: true
          wait_workflow: true
